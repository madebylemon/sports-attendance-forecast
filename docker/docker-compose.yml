version: '3.9'

services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    volumes:
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    environment:
      PYTHONUNBUFFERED: 1

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
