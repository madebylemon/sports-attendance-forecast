name: Daily data refresh and forecast

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC daily
  workflow_dispatch:        # Manual trigger for testing

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Refresh data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m pipeline.refresh

      - name: Engineer features
        run: python -m pipeline.features

      - name: Train model
        run: python -m pipeline.train || echo "Training failed - insufficient data. This is OK on first run."

      - name: Generate forecasts
        run: python -m pipeline.forecast || echo "Forecasting failed - model may not exist yet."

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ mlruns/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Trigger dashboard render
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: data-refreshed
